<script>
const dataA = [
  {id:'p1', label:'P1', title:'MAS vertical básico', sub:'m=200g · K=5 N/m · y₀=10cm · V₀=0',

    <div class="card"><div class="cl">Masa</div><div class="cv">0,2</div><div class="cu">kg</div></div>

   </div>
   <div class="sec">a) Período</div>
   <div class="step"><div class="sn">1</div><div class="st"><code>ω = √(k/m) = √(5/0,2) = √25 = 5 rad/s</code></div></div>
   <div class="step"><div class="sn">2</div><div class="st"><code>T = 2π/ω = 2π/5 ≈ 1,26 s</code></div></div>

   <hr class="divl">
   <div class="sec">b) EDO del sistema</div>
   <div class="step"><div class="sn">1</div><div class="st">Posición medida desde el PE → gravedad cancela</div></div>

   <div class="step"><div class="sn">2</div><div class="st">Ec. característica: <code>r² + 25 = 0 → r = ±5i</code> → raíces imaginarias puras = MAS</div></div>

   <div class="step"><div class="sn">3</div><div class="st"><code>a_max = ω²·A = 25 × 0,1 = 2,5 m/s²</code></div></div>

  {id:'p2', label:'P2', title:'Sistema imperial (slugs/lb/ft)', sub:'P=2lb · s_eq=6in · y(0)=8in debajo PE · y′(0)=−4/3 pies/s',

    <div class="card"><div class="cl">y(0)=8in</div><div class="cv">2/3</div><div class="cu">pies</div></div>

   <div class="step"><div class="sn">5</div><div class="st">CIs: <code>C₁ = 2/3 · C₂ = −4/3 / 8 = −1/6</code></div></div>

  },
  {id:'p3', label:'P3', title:'Influencia de la velocidad inicial', sub:'MAS no forzado · m=1 · k=16 · analizar CIs',
   content:`<div class="cards">
    <div class="card"><div class="cl">ω=√(k/m)</div><div class="cv">4</div><div class="cu">rad/s</div></div>
    <div class="card"><div class="cl">T</div><div class="cv">π/2</div><div class="cu">≈1,57 s</div></div>
    <div class="card"><div class="cl">C₁=y(0)</div><div class="cv">10</div><div class="cu">m</div></div>

   </div>
   <div class="sec">Resolución</div>
   <div class="step"><div class="sn">1</div><div class="st">EDO: <code>y″+16y=0 → r=±4i → y(t)=C₁cos(4t)+C₂sen(4t)</code></div></div>
   <div class="step"><div class="sn">2</div><div class="st">Con C₁=10, C₂=0: <code>y(t) = 10·cos(4t)</code></div></div>
   <div class="step"><div class="sn">3</div><div class="st">Primer cruce por PE: <code>cos(4t)=0 → t=π/8 ≈ 0,785 s</code></div></div>

   <hr class="divl">

  {id:'p4', label:'P4', title:'Posición en instantes dados', sub:'P=20lb · s=6 pulg · y(0)=0,5ft debajo PE · y′(0)=0',
   content:`<div class="sec">Planteo</div>
   <div class="step"><div class="sn">1</div><div class="st"><code>m = 20/32 = 5/8 slug</code></div></div>
   <div class="step"><div class="sn">2</div><div class="st"><code>k = P/s = 20/0,5 = 40 lb/ft</code></div></div>
   <div class="step"><div class="sn">3</div><div class="st">EDO: <code>(5/8)y″+40y=0 → y″+64y=0 → ω=8 rad/s</code></div></div>
   <div class="step"><div class="sn">4</div><div class="st">CIs: C₁=1/2, C₂=0</div></div>

   <div class="step"><div class="sn">1</div><div class="st"><code>y′(t) = −4·sen(8t)</code></div></div>
   <div class="step"><div class="sn">2</div><div class="st"><code>y′(3π/16) = 4 ft/s → hacia abajo ✓</code></div></div>

   <div class="sec">c) Primer paso por el PE</div>
   <div class="step"><div class="sn">1</div><div class="st"><code>y(t)=0 → cos(8t)=0 → 8t=π/2+nπ</code></div></div>
   <div class="step"><div class="sn">2</div><div class="st">n=0: <code>t=π/16 ≈ 0,196 s</code></div></div>
   <div class="ans">✓ Primer cruce: t=π/16 ≈ 0,196 s</div>`
  },
  {id:'p5', label:'P5', title:'Motor a 3600 rpm', sub:'A=±5cm · m=2kg · motor a 3600 rpm',
   content:`<div class="sec">Conversión rpm → rad/s</div>

   <div class="step"><div class="sn">2</div><div class="st"><code>ω = 2πf = 120π rad/s</code></div></div>
   <div class="step"><div class="sn">3</div><div class="st"><code>k = mω² = 2·(120π)² = 28800π² ≈ 284.132 N/m</code></div></div>

    <div class="card"><div class="cl">v_max=ωA</div><div class="cv">6π</div><div class="cu">≈18,85 m/s</div></div>
    <div class="card"><div class="cl">a_max=ω²A</div><div class="cv">7200π²</div><div class="cu">≈7106 m/s²</div></div>
   </div>
   <div class="ans">✓ v_max≈18,85 m/s · a_max≈7106 m/s² (altísimas por las 3600 rpm)</div>`
  },
  {id:'p6', label:'P6', title:'Análisis completo (h, e, f, g)', sub:'P=64lb · s=0,32ft · y(0)=−2/3ft · V₀=5ft/s↓',
   content:`<div class="sec">Planteo</div>
   <div class="step"><div class="sn">1</div><div class="st"><code>m=64/32=2 slugs · k=64/0,32=200 lb/ft</code></div></div>
   <div class="step"><div class="sn">2</div><div class="st">EDO: <code>2y″+200y=0 → y″+100y=0 → ω=10 rad/s</code></div></div>
   <div class="step"><div class="sn">3</div><div class="st">CIs: <code>C₁=−2/3 · C₂=1/2</code></div></div>
   <div class="formula">y(t) = −(2/3)cos(10t) + (1/2)sen(10t)</div>
   <div class="sec">b) Amplitud y período</div>
   <div class="step"><div class="sn">1</div><div class="st"><code>A=√((2/3)²+(1/2)²)=√(25/36)=5/6 ft≈0,833 ft</code></div></div>
   <div class="step"><div class="sn">2</div><div class="st"><code>T=2π/10=π/5 s≈0,628 s</code></div></div>
   <div class="ans">✓ A=5/6 ft · T=π/5 s</div>
   <hr class="divl">
   <div class="sec">c) Oscilaciones en 3π segundos</div>

   <hr class="divl">
   <div class="sec">d) 2da vez que pasa por PE hacia abajo</div>

   <hr class="divl">
   <div class="sec">e) Instantes de desplazamiento extremo</div>

  },
  {id:'p7', label:'P7', title:'Dos resortes en paralelo', sub:'P=20lb · k₁(s₁=6in) · k₂(s₂=2in) · V₀=2ft/s',
   content:`<div class="warn">⚠ Resortes en paralelo: k_total = k₁ + k₂. Cada uno tiene su elongación estática distinta.</div>
   <div class="sec">Planteo</div>
   <div class="step"><div class="sn">1</div><div class="st"><code>m=20/32=5/8 slug</code></div></div>
   <div class="step"><div class="sn">2</div><div class="st">Resorte 1: <code>k₁=P/s₁=20/0,5=40 lb/ft</code></div></div>
   <div class="step"><div class="sn">3</div><div class="st">Resorte 2: <code>k₂=P/s₂=20/(1/6)=120 lb/ft</code></div></div>
   <div class="step"><div class="sn">4</div><div class="st">Paralelo: <code>k=k₁+k₂=40+120=160 lb/ft</code></div></div>
   <div class="step"><div class="sn">5</div><div class="st">EDO: <code>(5/8)y″+160y=0 → y″+256y=0 → ω=16 rad/s</code></div></div>

   <div class="ans">✓ A=0,125 ft · ω=16 rad/s · T=π/8 s</div>`
  },
  {id:'p8', label:'P8', title:'Automóvil sobre un bache', sub:'m=1300kg · k=20.000N/m × 4 ruedas',

  },
  {id:'p9', label:'P9', title:'Solución dada, determinar parámetros', sub:'y(t)=−√2·sen(ωt)+√2·cos(ωt) · amplitud, φ, CIs si ω=4',

function buildTaller(data, navId, probsId) {
  const nav = document.getElementById(navId);
  const probs = document.getElementById(probsId);
  if (!nav || !probs) return;
  nav.innerHTML = data.map((d,i) =>
    `<button class="snbtn${i===0?' active':''}" onclick="showProb('${d.id}','${navId}','${probsId}')">${d.label}</button>`
  ).join('');
  probs.innerHTML = data.map((d,i) =>
    `<div class="prob${i===0?' active':''}" id="${d.id}">
      <div class="ph"><div class="pt">${d.title}</div><div class="ps">${d.sub}</div></div>
      ${d.content}
     </div>`
  ).join('');
}

function showProb(id, navId, probsId) {
  document.querySelectorAll(`#${probsId} .prob`).forEach(p=>p.classList.remove('active'));
  document.querySelectorAll(`#${navId} .snbtn`).forEach(b=>b.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
  const btns=[...document.querySelectorAll(`#${navId} .snbtn`)];
  const idx=el?[...document.getElementById(probsId).querySelectorAll('.prob')].indexOf(el):0;
  if(btns[idx]) btns[idx].classList.add('active');
  if(id==='sim') setTimeout(initSim,50);
}

function switchTaller(t) {
  document.querySelectorAll('.taller').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('taller-'+t).classList.add('active');
  document.querySelectorAll('.tab')[t==='a'?0:1].classList.add('active');
}

let playing=false, tAnim=0, animId=null, lastTs=null;
function getP(){return{m:parseFloat(document.getElementById('sl-m')?.value||0.2),k:parseFloat(document.getElementById('sl-k')?.value||5),A:parseFloat(document.getElementById('sl-a')?.value||0.1)};}
function upSim(){
  const {m,k,A}=getP(), w=Math.sqrt(k/m), T=2*Math.PI/w;
  const fmt=v=>v.toFixed(2);
  const el=id=>document.getElementById(id);
  if(el('out-m')) el('out-m').textContent=m.toFixed(1)+' kg';
  if(el('out-k')) el('out-k').textContent=k.toFixed(0)+' N/m';
  if(el('out-a')) el('out-a').textContent=A.toFixed(2)+' m';
  if(el('res-w')) el('res-w').textContent=fmt(w);
  if(el('res-t')) el('res-t').textContent=fmt(T);
  if(el('res-v')) el('res-v').textContent=fmt(w*A);
  if(el('res-ac')) el('res-ac').textContent=fmt(w*w*A);
  drawSim(w,A,tAnim);
}
function drawSim(w,A,tNow){
  const cv=document.getElementById('simC'); if(!cv) return;
  const dpr=window.devicePixelRatio||1, W=cv.offsetWidth, H=cv.offsetHeight||160;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  const axC=isDark?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.12)';
  ctx.clearRect(0,0,W,H);
  const pl=6,pr=6,pt=10,pb=10, gW=W-pl-pr, gH=H-pt-pb, cy=pt+gH/2;
  const T=2*Math.PI/w, tT=3*T, steps=Math.min(W*2,500);
  ctx.strokeStyle=axC; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(pl,cy); ctx.lineTo(pl+gW,cy); ctx.stroke();
  ctx.beginPath(); ctx.strokeStyle='#534AB7'; ctx.lineWidth=2;
  for(let i=0;i<=steps;i++){
    const t=(i/steps)*tT, y=A*Math.cos(w*t);
    const px=pl+(i/steps)*gW, py=cy-(y/(A*1.2))*(gH/2);
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.stroke();
  ctx.setLineDash([5,3]); ctx.beginPath(); ctx.strokeStyle='#1D9E75'; ctx.lineWidth=1.5;
  const vm=A*w;
  for(let i=0;i<=steps;i++){
    const t=(i/steps)*tT, yp=-A*w*Math.sin(w*t);
    const px=pl+(i/steps)*gW, py=cy-(yp/(vm*1.2))*(gH/2);
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.stroke(); ctx.setLineDash([]);
  if(playing){
    const tm=tNow%tT, yn=A*Math.cos(w*tm);
    const px=pl+(tm/tT)*gW, py=cy-(yn/(A*1.2))*(gH/2);
    ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fillStyle='#534AB7'; ctx.fill();
  }
}
function initSim(){upSim();}
function togPlay(){
  playing=!playing;
  const btn=document.getElementById('pbtn');
  if(btn) btn.textContent=playing?'⏸ Pausar':'▶ Animar';
  if(playing) requestAnimationFrame(anim); else{cancelAnimationFrame(animId);lastTs=null;}
}
function anim(ts){
  if(!playing) return;
  if(!lastTs) lastTs=ts;
  tAnim+=(ts-lastTs)/1000; lastTs=ts;
  const {m,k,A}=getP(); drawSim(Math.sqrt(k/m),A,tAnim);
  animId=requestAnimationFrame(anim);
}
window.addEventListener('resize',()=>{const {m,k,A}=getP(); drawSim(Math.sqrt(k/m),A,tAnim);});
setTimeout(()=>upSim(),150);
